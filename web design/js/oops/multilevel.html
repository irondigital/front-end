<body>
    <script>
        class car{
            constructor(name,year){
                this.name = name;
                this.year = year;
            }
        }
        class garage extends car{
            constructor(name,year,garagename,address){
                super(name,year);
                this.garagename = garagename;
                this.address = address;
            }
        }
        class hello extends garage{
            constructor(name,year,garagename,address,mile,km){
                super(name,year,garagename,address);
                this.mile= mile;
                this.km = km;
            }
        }

        let obj = new hello("tata",2023,"automobile","rajkot",24,60);
        console.log(obj)
    </script>
</body>
