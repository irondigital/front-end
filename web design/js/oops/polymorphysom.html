 <!-- overriding -->

 <script>
    class animal{
        sound(){
            console.log("animal")
        }
    }

    class dog extends animal{
        sound(){
            console.log("dog");
        }
    }

    let a = new animal();
    let d = new dog();
    a.sound();
    d.sound()
 </script>
