<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="btn"></p>

 <p id="para"></p>

<script>
async function loadAllTitles() {
  const res = await fetch("https://jsonplaceholder.typicode.com/posts");
  const data = await res.json();  // data = array

  let allTitles = "";

  data.forEach(item => {
    allTitles +=`{ ${item.title} 
                  ${item.body} 
                  ${item.id}}` ;   // add each title
  });

  document.getElementById("para").innerText = allTitles;
}

loadAllTitles();
</script>



    
</body>
</html>
