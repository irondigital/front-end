<div id="output"></div>

<script>
fetch("https://jsonplaceholder.typicode.com/photos")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(item => {
      html += `<img src="${item.image}" width="200">`;
    });
    document.getElementById("output").innerHTML = html;
  });
</script>
