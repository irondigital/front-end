<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(let i=1; i<=10; i++){
            if(i===5){
                break;
            }
            console.log("The number is " + i);
        }
    </script>
</body>
</html>
<!-- that is use for loop to print numbers from 1 to 10 but when the number reaches 5 it will break the loop and exit the loop. -->
