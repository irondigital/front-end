<!-- the do while loop is similar to the while loop, but with one key difference: the do while loop will always execute the code block at least once before checking the condition. after executing the code block, it checks the condition; if the condition is true, it will repeat the loop, otherwise, it will stop. -->

<!-- or
 -->

  <!-- do will execute one time if conditions is true or false. -->
<!-- syntax
do{
    // code to be executed
    // increment/decrement
}while(condition);
